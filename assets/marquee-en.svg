<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560" font-family="Lora, Georgia, serif">
  <!-- Background: warm cream -->
  <rect width="1400" height="560" fill="#faf9f5"/>

  <!-- Subtle ember accent strip on the left -->
