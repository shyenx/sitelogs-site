<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SiteLogs — Checkout</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="./assets/icon-128.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { ember: '#d97757', cream: '#faf9f5', ink: '#1f1d1a', stone: '#cdc9bf', line: '#e6e2d6', muted: '#6b665a' },
    fontFamily: { ui: ['Inter','system-ui','sans-serif'], display: ['Fraunces','Lora','Georgia','serif'] },
  } } };
</script>
<style>
  body { font-family: Inter, system-ui, sans-serif; }
  h1, h2, .font-display { font-family: 'Fraunces', 'Newsreader', Georgia, serif; font-optical-sizing: auto; }
</style>
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>
<body class="bg-cream text-ink antialiased">

<header class="w-full max-w-7xl mx-auto px-6 py-8 flex items-center justify-between">
  <a href="./" class="flex items-center gap-2.5">
    <img src="./assets/logo.svg" alt="" class="w-7 h-7" />
    <span class="font-display text-2xl font-semibold tracking-tight">SiteLogs</span>
  </a>
</header>

<main class="w-full max-w-2xl mx-auto px-6 py-16 text-center">
  <p class="font-ui text-xs uppercase tracking-[0.2em] text-ember mb-4">Checkout</p>
  <h1 class="font-display text-4xl font-semibold tracking-tight mb-6">Complete your purchase</h1>
  <p class="text-muted leading-relaxed mb-12 max-w-md mx-auto">
    Paddle's secure checkout will open in a moment. After payment we'll
    generate your license key and send it to your email.
  </p>

  <div id="status" class="text-sm text-muted">Loading checkout…</div>

  <div id="discount-applied" class="hidden mt-4 inline-flex items-center gap-2 text-sm text-ember">
    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 9.293a1 1 0 011.414 0L8 11.586l6.293-6.293a1 1 0 111.414 1.414l-7 7a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
    <span>Discount <code id="discount-code" class="font-medium"></code> applied</span>
  </div>

  <details id="manual-code" class="mt-8 max-w-sm mx-auto text-sm text-muted">
    <summary class="cursor-pointer hover:text-ink select-none">Have a discount code?</summary>
    <form id="discount-form" class="mt-4 flex gap-2">
      <input type="text" id="discount-input" placeholder="e.g. FRIEND" autocomplete="off" autocapitalize="characters"
             class="flex-1 border border-line rounded-md px-3 py-2 text-ink uppercase tracking-wide focus:outline-none focus:border-ember" />
      <button type="submit" class="bg-ink text-cream px-4 py-2 rounded-md text-sm font-medium hover:opacity-90">Apply</button>
    </form>
    <p class="mt-2 text-xs text-stone">Reloads the page with the code applied.</p>
  </details>

  <div id="error" class="hidden mt-6 max-w-md mx-auto border border-rose-300 bg-rose-50 text-rose-700 rounded-lg p-4 text-sm text-left"></div>
</main>

<footer class="w-full max-w-7xl mx-auto px-6 py-12 mt-12 border-t border-line">
  <div class="flex items-center justify-center gap-2 text-sm text-muted">
    <img src="./assets/logo.svg" alt="" class="w-5 h-5" />
    <span>© 2026 SiteLogs · Built by <a href="https://github.com/shyenx" target="_blank" rel="noopener" class="hover:text-ink underline-offset-2 hover:underline">shyenx</a></span>
  </div>
</footer>

<script>
  // ============= CONFIG =================
  // Sandbox values for now. Swap to production when going live.
  const PADDLE_ENV = 'production'; // 'sandbox' | 'production'
  const PADDLE_CLIENT_TOKEN = 'live_b472a8738b19b83d2efbbdfa76b';
  const PRICE_LIFETIME = 'pri_01kqketvax014165vwtnv131sp';
  const PRICE_EARLY_BIRD = 'pri_01kqkewny0jtw705z93wnxjmjg';
  // ======================================

  const params = new URLSearchParams(location.search);
  const variant = params.get('variant') === 'early' ? 'early' : 'lifetime';
  const priceId = variant === 'early' ? PRICE_EARLY_BIRD : PRICE_LIFETIME;
  // Magic-link discount: ?discount=FRIEND auto-applies the code in Paddle.
  // Codes are normalized to UPPERCASE since Paddle stores them that way.
  const discountCode = (params.get('discount') || '').trim().toUpperCase() || null;

  const status = document.getElementById('status');
  const errorBox = document.getElementById('error');
  const discountApplied = document.getElementById('discount-applied');
  const discountCodeEl = document.getElementById('discount-code');
  const manualCodeDetails = document.getElementById('manual-code');
  const discountForm = document.getElementById('discount-form');
  const discountInput = document.getElementById('discount-input');

  if (discountCode) {
    discountCodeEl.textContent = discountCode;
    discountApplied.classList.remove('hidden');
    manualCodeDetails.classList.add('hidden'); // hide manual entry once applied
  }

  discountForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const code = (discountInput.value || '').trim().toUpperCase();
    if (!code) return;
    const next = new URLSearchParams(location.search);
    next.set('discount', code);
    location.search = '?' + next.toString();
  });

  function showError(msg) {
    status.style.display = 'none';
    errorBox.classList.remove('hidden');
    errorBox.textContent = msg;
  }

  if (!window.Paddle) {
    showError('Paddle script failed to load. Disable ad-blockers and refresh.');
  } else if (PADDLE_CLIENT_TOKEN.startsWith('test_REPLACE') || priceId.startsWith('pri_REPLACE')) {
    showError('Paddle credentials are not yet configured on this site. Check back shortly.');
  } else {
    if (PADDLE_ENV === 'sandbox') Paddle.Environment.set('sandbox');
    Paddle.Initialize({
      token: PADDLE_CLIENT_TOKEN,
      eventCallback: (ev) => {
        if (ev.name === 'checkout.completed') {
          // Paddle's data shape: ev.data.transaction_id (Billing v2)
          const txnId = ev.data?.transaction_id ?? ev.data?.id ?? '';
          location.href = `./thanks.html?txn=${encodeURIComponent(txnId)}`;
        }
      },
    });
    // NOTE: do NOT set settings.successUrl here — Paddle's auto-redirect would
    // strip the transaction_id from the URL. Rely on eventCallback above.
    const checkoutOptions = {
      items: [{ priceId, quantity: 1 }],
      settings: {
        displayMode: 'overlay',
        theme: 'light',
        allowDiscountRemoval: true,
      },
    };
    if (discountCode) {
      checkoutOptions.discountCode = discountCode;
    }
    Paddle.Checkout.open(checkoutOptions);
    status.textContent = discountCode
      ? `Opening secure checkout with ${discountCode} applied…`
      : 'Opening secure checkout…';
  }
</script>
</body>
</html>
